<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/libros/' + idRuta"></ion-back-button>
    </ion-buttons>
    <!--<ion-title>{{ titulo() }}</ion-title>-->
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (cargando()) {
    <div class="loading">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  } @else if (pdfData(); as data) {

  <div style="height: 100vh;">

    <pdf-viewer
      [src]="data"
      [render-text]="true"
      [original-size]="false"
      style="display:block; width:100%; height:100%;"
    >
    </pdf-viewer>

  </div>

}
</ion-content>
