<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Crear cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="formulario" (ngSubmit)="onSubmit()">

    <ion-item>
      <ion-label position="stacked">Nombre</ion-label>
      <ion-input formControlName="name"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Email</ion-label>
      <ion-input formControlName="email" type="email"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Contraseña</ion-label>
      <ion-input formControlName="password" type="password"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Repite contraseña</ion-label>
      <ion-input formControlName="password_confirmation" type="password"></ion-input>
    </ion-item>

    @if (errorRegistro()) {
      <ion-text color="danger">
        <p class="ion-padding-start">{{ errorRegistro() }}</p>
      </ion-text>
    }

    <ion-button expand="block" type="submit" class="ion-margin-top">
      Crear cuenta
    </ion-button>

    <ion-button expand="block" fill="clear" routerLink="/auth/login">
      ¿Ya tienes cuenta? Inicia sesión
    </ion-button>
  </form>
</ion-content>
