<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Iniciar sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="formulario" (ngSubmit)="onSubmit()">

    <ion-item>
      <ion-label position="stacked">Email</ion-label>
      <ion-input formControlName="email" type="email" placeholder="tu@email.com"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Contraseña</ion-label>
      <ion-input formControlName="password" type="password"></ion-input>
    </ion-item>

    @if (errorLogin()) {
      <ion-text color="danger">
        <p class="ion-padding-start">{{ errorLogin() }}</p>
      </ion-text>
    }

    <ion-button shape="round" expand="block" type="submit" class="ion-margin-top">
      Entrar
    </ion-button>

    <ion-button shape="round" expand="block" fill="clear" routerLink="/auth/register">
      ¿No tienes cuenta? Regístrate
    </ion-button>
  </form>
</ion-content>
