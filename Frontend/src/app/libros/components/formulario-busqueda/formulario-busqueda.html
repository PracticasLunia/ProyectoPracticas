<h2>Filtrar por</h2>

<form autocomplete="off" [formGroup]="formulario" (ngSubmit)="onSubmit()">

<div class="p-4">

    <div class="flex gap-4">

      <div class="flex items-center gap-2">
        <label class="whitespace-nowrap">Titulo:</label>
        <input type="text"
          class="form-control"
          placeholder="Titulo"
          formControlName="titulo">
      </div>

      <div class="flex items-center gap-2">
        <label class="whitespace-nowrap">Isbn:</label>
        <input type="text"
          class="form-control"
          placeholder="Isbn"
          formControlName="isbn">
      </div>

      <div class="flex items-center gap-2">
        <label class="whitespace-nowrap">Autor:</label>
        <input type="text"
          class="form-control"
          placeholder="Autor"
          formControlName="autor">
      </div>

      <div class="flex items-center gap-2">
        <label class="whitespace-nowrap">Genero:</label>
        <input type="text"
          class="form-control"
          placeholder="Genero"
          formControlName="genero_nombre">
      </div>

      <div>
        <button class="btn btn-primary float-end"
          type="submit">
          Filtrar
        </button>
      </div>
    </div>
</div>

</form>
