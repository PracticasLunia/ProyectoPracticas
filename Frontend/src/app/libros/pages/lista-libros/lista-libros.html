<div class="container my-4">
  <div class="bg-white p-4 rounded shadow border">

    <h2 class="mb-4">Filtrar Libros por: </h2>

    <form autocomplete="off" [formGroup]="formulario" (ngSubmit)="onSubmit()">
      <div class="row g-3 align-items-end">

        <div class="col-12 col-sm-6 col-md-4 col-lg">
          <label class="form-label">Título</label>
          <input type="text"
                 class="form-control"
                 placeholder="Titulo"
                 formControlName="titulo">
        </div>

        <div class="col-12 col-sm-6 col-md-4 col-lg">
          <label class="form-label">Isbn</label>
          <input type="text"
                 class="form-control"
                 placeholder="Isbn"
                 formControlName="isbn">
        </div>

        <div class="col-12 col-sm-6 col-md-4 col-lg">
          <label class="form-label">Autor</label>
          <input type="text"
                 class="form-control"
                 placeholder="Autor"
                 formControlName="autor">
        </div>

        <div class="col-12 col-sm-6 col-md-4 col-lg">
          <label class="form-label">Genero</label>
          <input type="text"
                 class="form-control"
                 placeholder="Genero"
                 formControlName="genero_nombre">
        </div>

        <div class="col-12 col-sm-6 col-md-2 col-lg-auto">
          <button type="submit"
                  class="btn btn-primary w-100">
            Filtrar
          </button>
        </div>

        <div class="col-12 col-sm-6 col-md-2 col-lg-auto">
          <button type="button"
                  class="btn btn-success w-100"
                  [routerLink]="'/libros/nuevo'">
            Añadir
          </button>
        </div>

      </div>
    </form>

  </div>
</div>

<!--Tabla para cards-->
<table class="table table-hover">
  <thead class="table-light">
    <tr>
      <th>Título</th>
      <th>Autor</th>
      <th>Géneros</th>
      <th>Año</th>
      <th>Disponible</th>
    </tr>
  </thead>
  <!--Carga de las cards de libros-->
  <tbody>
    @for (libro of libros(); track libro.id) {
        <app-libro-card [libro]="libro"></app-libro-card>
    }
    @empty {
      <tr>
        <td colspan="5" class="text-center text-muted py-4">
          No se encontraron libros.
        </td>
      </tr>
    }
  </tbody>
</table>
