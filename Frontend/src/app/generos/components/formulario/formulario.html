
<a routerLink="/generos" class="text-muted text-decoration-none d-inline-flex align-items-center gap-1 mb-2">
  <i class="bi bi-arrow-left"></i> Volver al listado
</a>

@if (genero()!=null) {
  <h2 class="mb-3">Editar género</h2>
} @else {
  <h2 class="mb-3">Nuevo género</h2>
}

<form [formGroup]="formulario" (ngSubmit)="onSubmit()" style="max-width: 500px">

  <!-- Nombre -->
  <div class="mb-3">
    <label class="form-label">Nombre <span class="text-danger">*</span></label>
    <input type="text" class="form-control" formControlName="nombre">
            @if(formulario.get('nombre')?.errors?.['backend']){
              <div class="invalid-feedback d-block">
                {{ formulario.get('nombre')?.errors?.['backend'] }}
              </div>
            }
  </div>

  <!-- Descripción -->
  <div class="mb-3">
    <label class="form-label">Descripción</label>
    <textarea class="form-control" rows="3" formControlName="descripcion"
              placeholder="Descripción del género (opcional)..."></textarea>
  </div>

  <!-- Botones -->
  <div class="d-flex gap-2 pt-3 border-top">
    <button type="submit" class="btn btn-success">
      <i class="bi bi-check-lg"></i> Guardar
    </button>
    <a routerLink="/generos" class="btn btn-outline-secondary">
      <i class="bi bi-x-lg"></i> Cancelar
    </a>
  </div>

</form>
