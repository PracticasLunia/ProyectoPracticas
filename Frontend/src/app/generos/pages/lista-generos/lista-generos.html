<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Géneros</h2>
  <a routerLink="/generos/nuevo" class="btn btn-primary">
    <i class="bi bi-plus-lg"></i> Nuevo género
  </a>
</div>

<table class="table table-hover">
  <thead class="table-light">
    <tr>
      <th>Nombre</th>
      <th>Descripción</th>
    </tr>
  </thead>
  <tbody>
    @for (genero of generos(); track genero.id) {
      <tr>
        <td>
          <a [routerLink]="['/generos', genero.id]">
            {{ genero.nombre }}
          </a>
        </td>
        <td class="text-muted">
          {{ genero.descripcion  }}
        </td>
      </tr>
    } @empty {
      <tr>
        <td colspan="2" class="text-center text-muted py-4">
          No hay géneros registrados.
        </td>
      </tr>
    }
  </tbody>
</table>
