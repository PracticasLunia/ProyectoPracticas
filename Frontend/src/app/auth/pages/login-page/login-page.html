<div class="card-body p-4">
  <h2 class="h4 mb-1">Iniciar sesión</h2>
  <p class="text-muted mb-4">Accede para crear, editar y gestionar préstamos.</p>

  <form [formGroup]="formulario" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" formControlName="email">
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" formControlName="password">
    </div>

    @if (errorLogin()) {
      <div class="alert alert-danger py-2">{{ errorLogin() }}</div>
    }

    <button type="submit" class="btn btn-primary w-100">Entrar</button>
  </form>

   <hr class="my-4">
    <p class="text-center mb-0">
      <small class="text-muted">¿No tienes cuenta?</small>
      <a routerLink="/auth/register" class="ms-1">Registrate</a>
    </p>

</div>
